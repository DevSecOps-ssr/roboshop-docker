services:
  catalouge:
    build:
      context: ./Catalogue   
      dockerfile: Dockerfile
    image: ssr2702/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  
  mongodb:
    build:
      context: mongodb
      dockerfile: Dockerfile
    image: ssr2702/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if true, you need to create manualy
      