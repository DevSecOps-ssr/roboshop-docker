services:
  catalogue:
    build: ./Catalogue
    image: ssr2702/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: ssr2702/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    build: ./cart
    image: ssr2702/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
  shipping:
    build: ./shipping
    image: ssr2702/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
  frontend:
    build: ./frontend
    image: ssr2702/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
  mongodb:
    build: ./mongodb
    image: ssr2702/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: ssr2702/mysql:1.0.0
    container_name: mysql

networks:
  default:
    driver: bridge
    name: roboshop
    external: false #if true, you need to create manualy
      